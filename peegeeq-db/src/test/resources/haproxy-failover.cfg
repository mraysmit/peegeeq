# HAProxy configuration for PeeGeeQ failover integration tests.
#
# Topology:
#
#   Test client (PgConnectionManager / Vert.x pool)
#       ↓  TCP :5400
#   HAProxy   ──► pg_primary:5432   (active, health-checked every 500 ms)
#                 pg_secondary:5432 (backup – only activated when primary is DOWN)
#
# Failover behaviour:
#   - HAProxy marks pg_primary DOWN after 2 consecutive failed health-checks (~1 s).
#   - Traffic immediately switches to pg_secondary (backup).
#   - When pg_primary recovers (1 successful check), traffic switches back.
#
# The server names "pg_primary" and "pg_secondary" are Docker network aliases
# assigned to the Testcontainers PostgreSQL containers via withNetworkAliases().

global
    maxconn 200
    log     stdout format raw local0 info

defaults
    mode              tcp
    timeout connect   5s
    timeout client    60s
    timeout server    60s
    option            tcplog
    log               global

frontend pg_frontend
    bind *:5400
    default_backend pg_backends

backend pg_backends
    # leastconn is good for long-lived PostgreSQL connections.
    # With only one non-backup server active at a time it has the same
    # effect as 'first'.
    balance           leastconn
    # pgsql-check sends a PostgreSQL startup packet and validates a wire-protocol
    # response.  Unlike tcp-check, it detects PostgreSQL starting up, max_connections
    # exhausted, or a read-only replica — not just an open TCP port.
    # Requires a 'haproxy_check' user to exist in PostgreSQL (no password needed).
    # Created by haproxy-check-init.sql, loaded via withInitScript() on both containers.
    option            pgsql-check user haproxy_check

    # Primary: always preferred while healthy.
    server pg_primary   pg_primary:5432   check inter 500ms fall 2 rise 1

    # Secondary (backup): used only when pg_primary is unavailable.
    server pg_secondary pg_secondary:5432 check inter 500ms fall 2 rise 1 backup
