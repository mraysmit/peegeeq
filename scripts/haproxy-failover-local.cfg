# HAProxy configuration for PeeGeeQ local failover development environment.
# Used by docker-compose-failover-local.yml
#
# Exposes a stats page on :8404  →  http://localhost:8404/stats

global
    maxconn 500
    log     stdout format raw local0 info

defaults
    mode              tcp
    timeout connect   5s
    timeout client    60s
    timeout server    60s
    option            tcplog
    log               global

# ── PostgreSQL frontend ──────────────────────────────────────────────────────
frontend pg_frontend
    bind *:5400
    default_backend pg_backends

backend pg_backends
    balance           leastconn
    option            tcp-check

    # Primary: always preferred while healthy.
    server pg_primary   pg-primary:5432   check inter 500ms fall 2 rise 1

    # Secondary (backup): activated when pg_primary is unavailable.
    server pg_secondary pg-secondary:5432 check inter 500ms fall 2 rise 1 backup

# ── Stats page ───────────────────────────────────────────────────────────────
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
