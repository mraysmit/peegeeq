# PeeGeeQ Staging Environment Configuration
# Profile name: staging
# Load with: new PeeGeeQConfiguration("staging")
#            new PeeGeeQConfiguration("staging", overrides)
#
# All keys use the canonical peegeeq.* namespace recognised by PeeGeeQConfiguration.
# Deployment-specific values use the ${VAR} placeholder syntax, which is
# resolved in Phase 2 of configuration loading (after all 5 source layers are merged).
#
# See: docs/PEEGEEQ_CONFIGURATION_GUIDE.md
#   - Priority Chain > Phase 2: Placeholder resolution
#   - Environment Variable Mapping > Mechanism 2

# --- Database Connection ---
# Supply via env vars; placeholders fall back to staging defaults if env is not set.
peegeeq.database.host=${DB_HOST}
peegeeq.database.port=${DB_PORT}
peegeeq.database.name=${DB_NAME}
peegeeq.database.username=${DB_USERNAME}
peegeeq.database.password=${DB_PASSWORD}
peegeeq.database.schema=${DB_SCHEMA}
peegeeq.database.ssl.enabled=true

# --- Connection Pool (medium sizing for staging) ---
peegeeq.database.pool.min-size=2
peegeeq.database.pool.max-size=10
peegeeq.database.pool.shared=true
peegeeq.database.pool.connection-timeout-ms=10000
peegeeq.database.pool.idle-timeout-ms=600000
peegeeq.database.pool.max-lifetime-ms=3600000
peegeeq.database.pool.auto-commit=false

# --- Database Tuning ---
peegeeq.database.pipelining.enabled=true
peegeeq.database.pipelining.limit=64

# --- Queue Behaviour ---
peegeeq.queue.max-retries=3
peegeeq.queue.visibility-timeout=PT45S
peegeeq.queue.batch-size=25
peegeeq.queue.polling-interval=PT0.75S
peegeeq.queue.dead-letter.enabled=true
peegeeq.queue.priority.default=5
peegeeq.consumer.threads=4

# --- Stuck Message Recovery ---
peegeeq.queue.recovery.enabled=true
peegeeq.queue.recovery.processing-timeout=PT5M
peegeeq.queue.recovery.check-interval=PT10M

# --- Dead Consumer Detection ---
peegeeq.queue.dead-consumer-detection.enabled=true
peegeeq.queue.dead-consumer-detection.interval=PT1M

# --- Metrics (enabled for staging — moderate sampling) ---
peegeeq.metrics.enabled=true
peegeeq.metrics.reporting-interval=PT30S
peegeeq.metrics.depth-cache-interval=PT10S
peegeeq.metrics.jvm.enabled=true
peegeeq.metrics.database.enabled=true
# instance-id is optional: when unset, PeeGeeQ generates a unique id at startup

# --- Circuit Breaker ---
peegeeq.circuit-breaker.enabled=true
peegeeq.circuit-breaker.failure-threshold=5
peegeeq.circuit-breaker.wait-duration=PT1M
peegeeq.circuit-breaker.ring-buffer-size=100
peegeeq.circuit-breaker.failure-rate-threshold=50.0

# --- Health Check ---
peegeeq.health.enabled=true
peegeeq.health.check-interval=PT30S
peegeeq.health.timeout=PT5S

# --- Migration (validate but never auto-apply in staging) ---
peegeeq.migration.enabled=true
peegeeq.migration.validate-checksums=true
peegeeq.migration.auto-migrate=false

# --- Performance ---
peegeeq.performance.async.enabled=true
peegeeq.performance.async.thread-pool-size=5
peegeeq.performance.batch.enabled=true
peegeeq.performance.batch.max-size=50
peegeeq.performance.batch.timeout=PT5S

# --- PostgreSQL Notice Handling ---
peegeeq.notices.info.enabled=true
peegeeq.notices.info.level=INFO
peegeeq.notices.other.enabled=false

# --- Maintenance ---
peegeeq.maintenance.cleanup-interval=PT6H
peegeeq.maintenance.retention-period=P3D
